project:
  name: "{{ cookiecutter.project_slug }}"
  mode: "semi-auto"

research:
  topic: "{{ cookiecutter.research_goal }}"
  domains:
    - "machine-learning"
  daily_paper_count: 10
  quality_threshold: 4.0

runtime:
  timezone: "UTC"
  max_parallel_tasks: 3
  approval_timeout_hours: 12
  retry_limit: 2

notifications:
  channel: "console"
  target: ""
  on_stage_start: true
  on_stage_fail: true
  on_gate_required: true

knowledge_base:
  backend: "markdown"
  root: "docs/kb"

openclaw_bridge:
  use_cron: false
  use_message: false
  use_memory: false
  use_sessions_spawn: false
  use_web_fetch: false
  use_browser: false

llm:
  provider: "openai-compatible"
  base_url: "https://api.openai.com/v1"
  wire_api: "chat_completions"
  api_key_env: "OPENAI_API_KEY"
  api_key: ""
  primary_model: "gpt-4o"
  fallback_models:
    - "gpt-4.1"
    - "gpt-4o-mini"

security:
  hitl_required_stages: [5, 9, 20]
  allow_publish_without_approval: false
  redact_sensitive_logs: true

experiment:
  mode: "sandbox"
  time_budget_sec: 300
  max_iterations: 10
  metric_key: "primary_metric"
  metric_direction: "minimize"
  sandbox:
    python_path: ".venv/bin/python3"
    gpu_required: false
    max_memory_mb: 4096
  opencode:
    enabled: false
  code_agent:
    enabled: true
  benchmark_agent:
    enabled: true
  figure_agent:
    enabled: true
  repair:
    enabled: true
    max_cycles: 3

export:
  target_conference: "neurips_2025"
  authors: "{{ cookiecutter.author_name }}"
  bib_file: "references"
